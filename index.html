<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web → App Converter | Kokushibo</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap');
        body{font-family:'Poppins',sans-serif;background:linear-gradient(135deg,#0a0a23 0%,#1a0d2e 50%,#2d1b69 100%);color:#00ff88;overflow:auto;height:100vh;padding:20px;position:relative}
        
        .neon-glow{box-shadow:0 0 30px #00ff88,0 0 60px #ff00ff,0 0 90px #00ccff}
        .neon-text{text-shadow:0 0 15px #00ff88,0 0 30px #ff00ff}
        
        .header{position:sticky;top:0;background:rgba(15,15,45,0.98);backdrop-filter:blur(20px);padding:20px;border-bottom:3px solid rgba(0,255,136,0.6);neon-glow;margin:-20px -20px 30px -20px;text-align:center}
        .header h1{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(45deg,#00ff88,#ff00ff,#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        
        .container{max-width:900px;margin:0 auto}
        .input-section{background:rgba(20,20,50,0.95);border:3px solid rgba(0,255,136,0.5);border-radius:25px;padding:35px;margin-bottom:30px;neon-glow}
        .input-group{margin-bottom:25px}
        .input-group label{display:block;margin-bottom:10px;font-weight:700;color:#00ff88;font-size:16px}
        .input-field{width:100%;padding:18px;border:2px solid rgba(0,255,136,0.4);border-radius:20px;background:rgba(0,0,0,0.6);color:#00ff88;font-size:16px;font-family:inherit;transition:all 0.3s}
        .input-field:focus{outline:none;border-color:#00ff88;box-shadow:0 0 25px rgba(0,255,136,0.6)}
        .app-icon-preview{width:100px;height:100px;border-radius:25px;margin:20px auto 0;display:block;object-fit:cover;border:4px solid #00ff88;neon-glow}
        
        .generate-btn{width:100%;background:linear-gradient(45deg,#00ff88 0%,#ff00ff 50%,#00ccff 100%);color:#000;border:none;padding:25px;border-radius:30px;font-size:24px;font-weight:900;font-family:'Orbitron',sans-serif;cursor:pointer;transition:all 0.4s;margin:30px 0;text-transform:uppercase;letter-spacing:2px;neon-glow;position:relative;overflow:hidden}
        .generate-btn:hover{transform:scale(1.05) translateY(-5px);box-shadow:0 25px 60px rgba(0,255,136,0.8)}
        .generate-btn:active{transform:scale(0.98)}
        
        /* NEW POPUP CODE BOX */
        .code-popup{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);backdrop-filter:blur(30px);z-index:9999;justify-content:center;align-items:center;padding:20px}
        .code-popup.active{display:flex;flex-direction:column}
        .code-container{background:rgba(20,20,50,0.99);border:4px solid rgba(0,255,136,0.8);border-radius:30px;padding:40px;max-width:95%;max-height:90%;overflow:auto;neon-glow;position:relative;width:90%}
        .code-title{font-family:'Orbitron';font-size:28px;text-align:center;margin-bottom:25px;background:linear-gradient(45deg,#00ff88,#ff00ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .code-box{background:rgba(0,0,0,0.9);border:3px solid #00ff88;border-radius:25px;padding:30px;margin:20px 0;font-family:'Courier New',monospace;font-size:15px;color:#00ff88;white-space:pre-wrap;line-height:1.7;max-height:60vh;overflow:auto;position:relative}
        .code-actions{display:flex;gap:15px;justify-content:center;flex-wrap:wrap;margin-top:25px}
        .copy-btn{background:linear-gradient(45deg,#00ff88,#ff00ff);color:#000;border:none;padding:15px 30px;border-radius:25px;cursor:pointer;font-weight:900;font-size:16px;transition:all 0.3s;font-family:'Orbitron';neon-glow}
        .copy-btn:hover{transform:scale(1.1);box-shadow:0 10px 30px rgba(0,255,136,0.6)}
        .download-btn{background:linear-gradient(45deg,#ff00ff,#00ccff);color:#000;border:none;padding:15px 30px;border-radius:25px;cursor:pointer;font-weight:900;font-size:16px;transition:all 0.3s;font-family:'Orbitron';neon-glow}
        .download-btn:hover{transform:scale(1.1);box-shadow:0 10px 30px rgba(255,0,255,0.6)}
        .close-popup{position:absolute;top:20px;right:25px;background:rgba(255,0,0,0.8);color:#fff;border:none;border-radius:50%;width:45px;height:45px;font-size:24px;cursor:pointer;font-weight:900;transition:all 0.3s}
        .close-popup:hover{background:#ff4444;transform:scale(1.2)}
        
        @media(max-width:768px){.container{padding:10px}.input-section{padding:25px}.code-container{padding:25px;width:98%;margin:10px}}
    </style>
</head>
<body>
    <div class="header">
        <h1>🔥 KOKUSHIBO Web → App Converter (POPUP VERSION)</h1>
    </div>

    <div class="container">
        <div class="input-section">
            <div class="input-group">
                <label>📱 App Name</label>
                <input type="text" class="input-field" id="appName" placeholder="Kokushibo Anime Hub" value="Kokushibo Anime Hub">
            </div>
            <div class="input-group">
                <label>🎨 App Icon URL</label>
                <input type="url" class="input-field" id="appIcon" placeholder="https://i.imgur.com/0zsfHsl.jpeg" value="https://i.imgur.com/0zsfHsl.jpeg">
            </div>
            <div class="input-group">
                <label>🌐 Main Website URL</label>
                <input type="url" class="input-field" id="mainUrl" placeholder="https://your-main-site.vercel.app">
            </div>
            <div class="input-group">
                <label>🔒 Hidden URLs (JSON)</label>
                <textarea class="input-field" id="hiddenUrls" rows="4" placeholder='["site1.vercel.app","site2.netlify.app","other-site.com"]'>["site1.vercel.app","site2.netlify.app"]</textarea>
            </div>
            <img id="iconPreview" class="app-icon-preview" style="display:none">
            <button class="generate-btn" onclick="generateApp()">🚀 GENERATE APP CODE (POPUP)</button>
        </div>
    </div>

    <!-- NEW POPUP CODE BOX -->
    <div class="code-popup" id="codePopup">
        <div class="code-container">
            <button class="close-popup" onclick="closePopup()">×</button>
            <h2 class="code-title">✅ YOUR APP READY! (Copy & Deploy)</h2>
            <div class="code-box" id="appCodeBox"></div>
            <div class="code-actions">
                <button class="copy-btn" onclick="copyCode()">📋 COPY ALL CODE</button>
                <button class="download-btn" onclick="downloadCode()">💾 DOWNLOAD HTML</button>
            </div>
        </div>
    </div>

    <script>
        // Icon Preview
        document.getElementById('appIcon').addEventListener('input', function() {
            const preview = document.getElementById('iconPreview');
            preview.src = this.value;
            preview.style.display = 'block';
        });

        function generateApp() {
            const appName = document.getElementById('appName').value || 'My App';
            const appIcon = document.getElementById('appIcon').value || 'https://via.placeholder.com/512';
            const mainUrl = document.getElementById('mainUrl').value || 'https://example.com';
            let hiddenUrls;
            
            try {
                hiddenUrls = JSON.parse(document.getElementById('hiddenUrls').value || '[]');
            } catch(e) {
                alert('❌ Hidden URLs me galat JSON! Example: ["site1.com","site2.com"]');
                return;
            }

            const appCode = `<!DOCTYPE html>
<html>
<head>
    <title>${appName}</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="manifest" href="data:application/manifest+json,{
        "name":"${appName}","short_name":"${appName.split(' ')[0]}","icons":[{"src":"${appIcon}","sizes":"512x512","type":"image/png"}],"start_url":".","display":"standalone","theme_color":"#0a0a23","background_color":"#0a0a23"
    }">
    <style>*,:after,:before{box-sizing:border-box}body,html{height:100%;margin:0;overflow:hidden;padding:0;background:#0a0a23;font-family:system-ui}iframe{border:none;height:100%;width:100%;background:#000}</style>
</head>
<body>
    <iframe src="${mainUrl}" id="appFrame"></iframe>
    <script>
        // 🔥 ALL LINKS HIDDEN FOREVER - ADDRESS BAR LOCKED
        const HIDDEN_SITES = ${JSON.stringify(hiddenUrls)};
        const frame = document.getElementById('appFrame');
        
        // INTERCEPT ALL CLICKS
        window.addEventListener('click',e=>{
            const link = e.target.closest('a');
            if(link?.href){
                e.preventDefault();
                const url = link.href;
                const target = HIDDEN_SITES.find(h=>url.includes(h)) || url;
                frame.src = target;
                return false;
            }
        },true);
        
        // BLOCK BACK BUTTON
        history.pushState(null,null,location.href);
        window.onpopstate = ()=>history.go(1);
        
        // FULLSCREEN PWA
        document.addEventListener('fullscreenchange',()=>document.fullscreenElement||requestFullscreen());
        async function requestFullscreen(){if(document.documentElement.requestFullscreen)await document.documentElement.requestFullscreen()}
    <\/script>
</body>
</html>`;

            document.getElementById('appCodeBox').textContent = appCode;
            document.getElementById('codePopup').classList.add('active');
        }

        function closePopup() {
            document.getElementById('codePopup').classList.remove('active');
        }

        function copyCode() {
            const code = document.getElementById('appCodeBox').textContent;
            navigator.clipboard.writeText(code).then(()=>{
                const btn = event.target;
                btn.textContent = '✅ COPIED!';
                btn.style.background = '#00ff88';
                setTimeout(()=>{btn.textContent='📋 COPY ALL CODE';btn.style.background=''},1500);
            });
        }

        function downloadCode() {
            const code = document.getElementById('appCodeBox').textContent;
            const blob = new Blob([code],{type:'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'kokushibo-app.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        // Close popup on outside click
        document.getElementById('codePopup').addEventListener('click',function(e){
            if(e.target===this)this.classList.remove('active');
        });
    </script>
</body>
</html>
